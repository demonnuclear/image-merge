<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--
    Jinja2 模板语法：
    {{ title }} 输出 Python 传递过来的变量值
    类似 JSP 的 ${ title } 或 Razor 的 @Model.Title
    -->
    <title>{{ title }}</title>
    <!--
    url_for('static', filename='style.css')
    这是 Flask 的静态文件 URL 生成函数
    会自动映射到 static/style.css
    -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <!-- 页面标题 -->
        <div class="page-title">
            &#x1f4f7; <span>图片去重合并工具</span>
        </div>

        <!-- 配置表单卡片 -->
        <div class="card">
            <h2>&#x2699;&#xFE0F; 目录配置</h2>

            <!--
            Flask 表单处理：
            action="{{ url_for('index') }}"
            表单提交到 / 路径（index 函数）
            method="POST"
            用 POST 方法提交（数据在请求体中，不在 URL 中）
            -->
            <form action="{{ url_for('index') }}" method="POST">
                <!-- 目录 A 路径 -->
                <div class="form-group">
                    <label>目录 A 路径（图片来源）</label>
                    <input type="text" name="dir_a"
                           value="{{ config.get('dir_a', '') }}"
                           placeholder="/volume1/photo/phone"
                           required>
                </div>

                <!-- 目录 B 路径 -->
                <div class="form-group">
                    <label>目录 B 路径（目标合并位置）</label>
                    <input type="text" name="dir_b"
                           value="{{ config.get('dir_b', '') }}"
                           placeholder="/volume1/photo/camera"
                           required>
                </div>

                <!-- 合并方向（单选用 radio） -->
                <div class="form-group">
                    <label>合并方向</label>
                    <div class="radio-group">
                        <label>
                            <!--
                            Jinja2 条件判断：
                            {% if cond %}...{% else %}...{% endif %}
                            如果 config.merge_direction 是 'a_to_b'，加上 checked 属性
                            -->
                            <input type="radio" name="merge_direction"
                                   value="a_to_b"
                                   {{ 'checked' if config.get('merge_direction') == 'a_to_b' else '' }}>
                            A &#x2192; B（A 合并到 B，保留 B）
                        </label>
                        <label>
                            <input type="radio" name="merge_direction"
                                   value="b_to_a"
                                   {{ 'checked' if config.get('merge_direction') == 'b_to_a' else '' }}>
                            B &#x2192; A（B 合并到 A，保留 A）
                        </label>
                    </div>
                </div>

                <!-- 预览模式（复选框） -->
                <!-- 注意：如果复选框未选中，浏览器不会提交该字段 -->
                <div class="form-group">
                    <div class="checkbox-group">
                        <label>
                            <input type="checkbox" name="preview_mode"
                                   {{ 'checked' if config.get('preview_mode', True) else '' }}>
                            预览模式（仅扫描分析，不执行任何写操作）
                        </label>
                    </div>
                </div>

                <!-- 提交按钮 -->
                <div class="actions">
                    <button type="submit" class="btn btn-primary" id="scanBtn">
                        &#x1F50D; 开始扫描
                    </button>
                </div>
            </form>
        </div>

        <!-- 使用说明 -->
        <div class="card">
            <h2>&#x1F4D6; 使用说明</h2>
            <ol>
                <li>填写两个图片目录的完整路径（飞牛 OS 上的绝对路径）</li>
                <li>选择合并方向：A→B 表示把 A 的内容合并到 B</li>
                <li>预览模式默认开启——只扫描分析，不修改文件</li>
                <li>点击「开始扫描」等待分析完成</li>
                <li>查看分析报告，确认合并方案后执行</li>
            </ol>
        </div>
    </div>

    <!-- 提交时禁用按钮（防重复提交） -->
    <!-- 注意：必须在 form 的 submit 事件中禁用按钮，而不是 button 的 click
         因为在 click 中直接禁用按钮，某些浏览器会阻止表单提交 -->
    <script>
        document.querySelector('form')?.addEventListener('submit', function(e) {
            var btn = document.getElementById('scanBtn');
            btn.disabled = true;
            btn.innerHTML = '&#x23F3; 扫描中...';
        });
    </script>
</body>
</html>
